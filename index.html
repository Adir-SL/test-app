<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .input-row button:hover { background: #4338ca; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 5px 14px;
      border: 1.5px solid #ddd;
      border-radius: 20px;
      background: white;
      font-size: 0.85rem;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: white;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    li:last-child { border-bottom: none; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 1rem;
      color: #222;
      word-break: break-word;
    }

    li span.done {
      text-decoration: line-through;
      color: #aaa;
    }

    li button.delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    li button.delete:hover { color: #ef4444; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #888;
    }

    .footer button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: underline;
    }

    .footer button:hover { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo</h1>

    <div class="input-row">
      <input type="text" id="new-todo" placeholder="Add a task..." />
      <button onclick="addTodo()">Add</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">All</button>
      <button onclick="setFilter('active', this)">Active</button>
      <button onclick="setFilter('done', this)">Done</button>
    </div>

    <ul id="todo-list"></ul>

    <div class="footer">
      <span id="count"></span>
      <button onclick="clearDone()">Clear completed</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todo-list');
      const visible = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (visible.length === 0) {
        list.innerHTML = '<li class="empty" style="display:block">No tasks here.</li>';
      } else {
        list.innerHTML = visible.map(t => `
          <li>
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span class="${t.done ? 'done' : ''}">${escape(t.text)}</span>
            <button class="delete" onclick="remove(${t.id})" title="Delete">&#x2715;</button>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('count').textContent =
        `${remaining} item${remaining !== 1 ? 's' : ''} left`;
    }

    function escape(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      save();
      render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
